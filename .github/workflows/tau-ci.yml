name: Tau CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-powershell-gate:
    name: Windows PowerShell gate
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_NOLOGO: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        shell: pwsh
        run: dotnet restore Tau.slnx --verbosity minimal

      - name: Release contract smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-release-contracts.ps1

      - name: Session audit script smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-session-audit-scripts.ps1

      - name: CodingAgent session migration smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-coding-agent-session-migration.ps1

      - name: Edit tool stats smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-edit-tool-stats.ps1

      - name: Mom timestamp migration smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-mom-timestamp-migration.ps1

      - name: CodingAgent startup profile smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-coding-agent-startup-profile.ps1

      - name: Release version sync smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-release-version-sync.ps1

      - name: No-env validation and smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-no-env.ps1 -SkipRestore -RunSmoke

      - name: Build release artifact
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-release-artifacts.ps1 -Configuration Release

      - name: Package and smoke release archive
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\package-release-matrix.ps1 -Runtimes win-x64

      - name: Package tar.gz structure smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\package-release-artifacts.ps1 -ArtifactRoot .\artifacts\tau-win-x64 -ArchiveFormat tar.gz -ArchiveRoot .\artifacts\release-format-smoke -SkipExecutableSmoke

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: tau-win-x64-release
          path: artifacts/releases/tau-win-x64.zip
          if-no-files-found: error
